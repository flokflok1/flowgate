# production stack: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
services:
  postgres:
    image: postgres:18.3-alpine
    container_name: flowgate-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowgate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: flowgate
    # no host port — only reachable from the backend container
    volumes:
      - postgres_prod_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowgate -d flowgate']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: flowgate-prod-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://flowgate:${POSTGRES_PASSWORD}@postgres:5432/flowgate
      JWT_SECRET: ${JWT_SECRET:?set in .env.prod}
      JWT_EXPIRES_IN: 1h
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: flowgate-prod-frontend
    restart: unless-stopped
    ports:
      - '8081:80'
    depends_on:
      - backend

volumes:
  postgres_prod_data:
