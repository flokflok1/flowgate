services:
  postgres:
    image: postgres:17-alpine
    container_name: flowgate-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowgate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — copy .env.example to .env}
      POSTGRES_DB: ${POSTGRES_DB:-flowgate}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowgate -d flowgate"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
